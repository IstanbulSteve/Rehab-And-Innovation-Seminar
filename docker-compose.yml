services:
  web:
    build: .
    container_name: seminar-web
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/uploads:/app/server/uploads
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: seminar-db
    environment:
      POSTGRES_DB: seminar_db
      POSTGRES_USER: seminar
      POSTGRES_PASSWORD: seminar_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seminar -d seminar_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
